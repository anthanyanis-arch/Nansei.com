<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wishlist — Nansai Organics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700;900&family=Roboto:wght@500;700&display=swap" rel="stylesheet"/>
<script src="../js/config.js"></script>
<script src="../frontend/js/api.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        display: ['"Cormorant Garamond"', 'serif'],
        body: ['"Inter"', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
:root {
  --forest:      #1a3a2a;
  --forest-deep: #0f2218;
  --forest-mid:  #2d5a3d;
  --forest-leaf: #4a8c5c;
  --forest-sage: #8fbc9a;
  --cream:       #f7f3ec;
  --warm-white:  #fdfaf5;
  --gold:        #c9a84c;
  --gold-lt:     #e8c97a;
  --gold-dk:     #b8922a;
  --text-dk:     #1a2416;
  --text-md:     #3d5a45;
  --text-lt:     #7a9980;
  --nav-h:       68px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text-dk); overflow-x: hidden; }

/* NAV */
.site-nav {
  position: sticky; top: 0; z-index: 1000;
  background: #fff;
  border-bottom: 1px solid rgba(26,58,42,.12);
  height: var(--nav-h);
}
.nav-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center;
  height: 100%; padding: 0 1.75rem; gap: 1.25rem;
}
.nav-logo-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem; font-weight: 700; color: var(--forest-deep);
  letter-spacing: .04em;
}
.nav-logo-brand em { font-style: normal; color: var(--gold-dk); }
.nav-icon-btn {
  position: relative; display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
  background: none; color: var(--forest-deep); text-decoration: none;
  transition: color .2s, background .2s;
}
.nav-icon-btn svg { width: 19px; height: 19px; }
.nav-icon-btn:hover { color: var(--forest-leaf); background: rgba(74,140,92,.08); }
.nav-badge {
  position: absolute; top: -2px; right: -2px;
  background: #ef4444; color: #fff; font-size: .56rem; font-weight: 800;
  min-width: 15px; height: 15px; padding: 0 3px; border-radius: 30px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #fff;
}

/* HERO BANNER */
.wish-hero {
  background: linear-gradient(135deg, var(--forest-deep) 0%, var(--forest-mid) 60%, #1a4a2e 100%);
  position: relative; overflow: hidden;
  padding: 3.5rem 1.5rem 3rem;
}
.wish-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 50%, rgba(201,168,76,.12) 0%, transparent 60%),
              radial-gradient(ellipse at 10% 80%, rgba(74,140,92,.15) 0%, transparent 50%);
}
.wish-hero-leaf {
  position: absolute; pointer-events: none; opacity: .12;
}
@keyframes leafDrift {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%     { transform: translateY(-20px) rotate(12deg); }
}

/* CARD */
.wish-card {
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(26,58,42,.07);
  box-shadow: 0 2px 16px rgba(10,30,15,.06);
  transition: transform .32s cubic-bezier(.34,1.56,.64,1), box-shadow .32s;
  position: relative;
  display: flex; flex-direction: column;
}
.wish-card:hover {
  transform: translateY(-6px) scale(1.013);
  box-shadow: 0 20px 48px rgba(10,30,15,.14);
}
.wish-card-img {
  position: relative; width: 100%; height: 220px; overflow: hidden; background: #f0fdf4;
  flex-shrink: 0;
}
.wish-card-img img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .55s cubic-bezier(.22,1,.36,1);
}
.wish-card:hover .wish-card-img img { transform: scale(1.07); }

/* REMOVE BTN */
.remove-btn {
  position: absolute; top: 10px; right: 10px; z-index: 10;
  width: 30px; height: 30px; border-radius: 50%;
  background: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(0,0,0,.12);
  transition: transform .2s, background .2s, color .2s;
  color: #ef4444; font-size: .85rem;
}
.remove-btn:hover { background: #ef4444; color: #fff; transform: scale(1.15) rotate(8deg); }

/* BADGE */
.card-badge {
  position: absolute; top: 10px; left: 10px; z-index: 10;
  font-size: .56rem; font-weight: 800; padding: 2px 9px; border-radius: 20px; color: #fff;
}

/* SHARE BUTTON */
.share-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: .72rem; font-weight: 600; color: var(--forest-leaf);
  background: none; border: 1.5px solid rgba(74,140,92,.25); border-radius: 8px;
  padding: 6px 14px; cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
}
.share-btn:hover { background: var(--forest-leaf); color: #fff; border-color: var(--forest-leaf); }

/* ADD TO CART BTN */
.atc-btn {
  width: 100%; background: var(--forest-deep); color: #fff;
  font-size: .75rem; font-weight: 700; padding: 10px 8px; border-radius: 10px;
  border: none; cursor: pointer; font-family: 'Roboto', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background .2s, transform .15s;
  box-shadow: 0 3px 12px rgba(15,34,24,.22);
}
.atc-btn:hover { background: var(--forest-mid); transform: translateY(-1px); }
.atc-btn.added { background: #16a34a; }

/* EMPTY STATE */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
  padding: 5rem 1.5rem; min-height: 400px;
}

/* TOAST */
#toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--forest-deep); color: var(--cream);
  font-size: .78rem; font-weight: 600;
  padding: .5rem 1.4rem; border-radius: 30px;
  opacity: 0; pointer-events: none; white-space: nowrap;
  z-index: 9999; box-shadow: 0 8px 28px rgba(10,30,15,.3);
  border: 1px solid rgba(201,168,76,.22);
  transition: opacity .3s, transform .3s;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* SCROLL REVEAL */
.sr { opacity: 0; transform: translateY(28px); transition: opacity .65s cubic-bezier(.22,1,.36,1), transform .65s cubic-bezier(.22,1,.36,1); }
.sr.vis { opacity: 1; transform: none; }
.sd-1 { transition-delay: .06s; }
.sd-2 { transition-delay: .12s; }
.sd-3 { transition-delay: .18s; }
.sd-4 { transition-delay: .24s; }
.sd-5 { transition-delay: .30s; }
.sd-6 { transition-delay: .36s; }

/* STATS BAR */
.stats-bar {
  display: flex; gap: 1.5rem; align-items: center;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
  border-radius: 14px; padding: .85rem 1.4rem;
  backdrop-filter: blur(8px);
  flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem; font-weight: 700; color: var(--gold-lt); line-height: 1;
}
.stat-label { font-size: .52rem; letter-spacing: .13em; text-transform: uppercase; color: rgba(255,255,255,.45); margin-top: 2px; }

/* FILTER PILLS */
.fpill {
  flex-shrink: 0; padding: .42rem 1rem; border-radius: 30px;
  border: 1.5px solid rgba(26,58,42,.15); background: #fff; color: var(--text-md);
  font-size: .76rem; font-weight: 600; font-family: 'Inter', sans-serif;
  cursor: pointer; white-space: nowrap;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
}
.fpill:hover { border-color: var(--forest-leaf); color: var(--forest-leaf); transform: translateY(-1px); }
.fpill.active { background: var(--forest-deep); color: #fff; border-color: var(--forest-deep); box-shadow: 0 4px 14px rgba(15,34,24,.22); transform: translateY(-1px); }

/* QTY PILLS */
.qty-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; flex: 1; }
.qty-pill {
  padding: 6px 2px; border-radius: 5px; font-size: .6rem; font-weight: 700;
  border: 1.5px solid rgba(26,58,42,.18); background: #f8faf8; color: var(--forest-deep);
  cursor: pointer; transition: all .18s; text-align: center;
  font-family: 'Inter', sans-serif; line-height: 1; width: 100%;
}
.qty-pill:hover { border-color: var(--forest-leaf); background: rgba(74,140,92,.08); }
.qty-pill.selected { background: var(--forest-deep); color: #fff; border-color: var(--forest-deep); }
.qty-cart-btn {
  flex-shrink: 0; width: 46px; border-radius: 8px; border: none;
  background: #059669; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s; align-self: stretch;
}
.qty-cart-btn:hover { background: #047857; }
.qty-cart-btn.done { background: #16a34a; }
@keyframes qtyFade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.qty-selector-row { display: flex; gap: 6px; animation: qtyFade 220ms ease-out both; }

/* MOVE ALL BTN */
.move-all-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--gold-dk); color: #fff;
  font-size: .72rem; font-weight: 700; letter-spacing: .04em;
  padding: .55rem 1.25rem; border-radius: 10px; border: none; cursor: pointer;
  font-family: 'Roboto', sans-serif; transition: background .2s, transform .2s;
  box-shadow: 0 4px 14px rgba(184,146,42,.3);
}
.move-all-btn:hover { background: var(--gold); transform: translateY(-1px); }

/* PROGRESS SAVINGS */
.savings-track {
  height: 6px; background: rgba(26,58,42,.1); border-radius: 30px; overflow: hidden; margin-top: 6px;
}
.savings-fill {
  height: 100%; background: linear-gradient(90deg, #4a8c5c, #16a34a);
  border-radius: 30px; transition: width .8s cubic-bezier(.22,1,.36,1);
}

/* CART DRAWER */
#cartBackdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1100; backdrop-filter: blur(2px); }
#cartDrawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(380px,100vw);
  background: #fff; z-index: 1101; transform: translateX(100%);
  transition: transform .35s cubic-bezier(.77,0,.18,1);
  display: flex; flex-direction: column;
  box-shadow: -8px 0 40px rgba(0,0,0,.15);
}

/* MOB BOTTOM BAR */
#mob-sticky-bar {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1080;
  background: #fff; border-top: 1px solid rgba(26,58,42,.1);
  box-shadow: 0 -4px 20px rgba(10,30,15,.1);
  padding: .45rem .5rem;
  padding-bottom: calc(.45rem + env(safe-area-inset-bottom, 0px));
}
.mob-bar-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  flex: 1; padding: .3rem .2rem; background: none; border: none; cursor: pointer;
  color: var(--text-md); text-decoration: none; font-size: .58rem; font-weight: 600;
  letter-spacing: .04em; border-radius: 10px; transition: color .2s, background .2s;
  -webkit-tap-highlight-color: transparent;
}
.mob-bar-btn svg { width: 20px; height: 20px; }
.mob-bar-btn.active { color: var(--forest-deep); }
.mob-bar-btn.primary {
  background: var(--forest-deep); color: #fff; border-radius: 14px;
  padding: .45rem .6rem; flex: 1.4;
  box-shadow: 0 4px 14px rgba(15,34,24,.28);
}
.mob-bar-icon-wrap { position: relative; }
.mob-bar-badge {
  position: absolute; top: -4px; right: -6px; background: #ef4444; color: #fff;
  font-size: .48rem; font-weight: 800; min-width: 14px; height: 14px; padding: 0 3px;
  border-radius: 20px; display: flex; align-items: center; justify-content: center;
  border: 1.5px solid #fff;
}

@media (max-width: 768px) {
  :root { --nav-h: 58px; }
  #mob-sticky-bar { display: flex; align-items: center; justify-content: space-around; gap: .25rem; }
  body { padding-bottom: 64px; }
  .wish-hero { padding: 2rem 1rem 1.75rem; }
  .wish-card-img { height: 170px; }
  .nav-inner { padding: 0 1rem; gap: .6rem; }
  .wish-mob-search { display: block !important; }
  #wishSearchInput { display: none; }
}

/* SHARE MODAL */
#shareModal {
  position: fixed; inset: 0; background: rgba(0,0,0,0);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 2200; pointer-events: none; transition: background .3s;
}
#shareModal.open { background: rgba(0,0,0,.55); pointer-events: all; }
.share-sheet {
  background: #fff; border-radius: 24px 24px 0 0;
  padding: 1.5rem 1.5rem 2.5rem; width: 100%; max-width: 480px;
  transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
}
#shareModal.open .share-sheet { transform: translateY(0); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px) scale(.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.card-enter { animation: cardIn .4s cubic-bezier(.22,1,.36,1) both; }
@keyframes heartPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.4); }
  70%  { transform: scale(.88); }
  100% { transform: scale(1); }
}
.heart-pop { animation: heartPop .35s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<div style="background:#fff;border-bottom:1px solid rgba(26,58,42,.07);padding:.9rem 1.5rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(10,30,15,.04);">
  <div style="max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
    <!-- Filter Pills -->
    <div style="display:flex;align-items:center;gap:.45rem;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;" id="filterRow">
      <button class="fpill active" data-cat="all"       onclick="setFilter(this,'all')">All</button>
      <button class="fpill"        data-cat="rice"      onclick="setFilter(this,'rice')">🌾 Rice</button>
      <button class="fpill"        data-cat="flowers"   onclick="setFilter(this,'flowers')">🌸 Flowers</button>
      <button class="fpill"        data-cat="beverages" onclick="setFilter(this,'beverages')">🥤 Beverages</button>
      <button class="fpill"        data-cat="flour"     onclick="setFilter(this,'flour')">🫙 Flour</button>
      <button class="fpill"        data-cat="other"     onclick="setFilter(this,'other')">🌿 Other</button>
    </div>
    <!-- Actions -->
    <div style="display:flex;align-items:center;gap:.65rem;flex-shrink:0;">
      <button class="move-all-btn" id="moveAllBtn" onclick="addAllToCart()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 002 1.58h9.78a2 2 0 001.95-1.57l1.65-7.43H5.12"/></svg>
        Add All to Cart
      </button>
      <button class="share-btn" id="shareListBtn" onclick="openShare()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
      <button onclick="clearWishlist()" style="font-size:.72rem;font-weight:600;color:#ef4444;background:none;border:1.5px solid rgba(239,68,68,.2);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;" onmouseover="this.style.background='rgba(239,68,68,.06)'" onmouseout="this.style.background='none'">
        Clear All
      </button>
    </div>
  </div>
</div>

<!-- ═══ MAIN CONTENT ═══ -->
<main style="max-width:1400px;margin:0 auto;padding:2.5rem 1.5rem 3rem;">

  <!-- EMPTY STATE -->
  <div id="emptyState" class="empty-state" style="display:none;">
    <div style="width:100px;height:100px;background:linear-gradient(135deg,rgba(74,140,92,.1) 0%,rgba(201,168,76,.08) 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.8rem;margin-bottom:1.5rem;box-shadow:0 8px 32px rgba(74,140,92,.12);">🌿</div>
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;color:var(--text-dk);margin-bottom:.6rem;">Your wishlist is empty</h2>
    <p style="color:var(--text-lt);font-size:.85rem;max-width:360px;line-height:1.65;margin-bottom:1.75rem;">Discover our farm-fresh organic products and save your favourites here for later.</p>
    <a href="index.html#products" style="display:inline-flex;align-items:center;gap:8px;background:var(--forest-deep);color:#fff;font-size:.8rem;font-weight:700;padding:.75rem 1.75rem;border-radius:12px;text-decoration:none;transition:all .2s;box-shadow:0 4px 16px rgba(15,34,24,.22);" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="7" height="7"/><rect x="15" y="3" width="7" height="7"/><rect x="15" y="15" width="7" height="7"/><rect x="2" y="15" width="7" height="7"/></svg>
      Browse Products
    </a>
  </div>

  <!-- GRID -->
  <div id="wishGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;overflow:visible;"></div>

  <!-- RECOMMENDED (shown when wishlist has items) -->
  <div id="recSection" style="margin-top:3.5rem;display:none;">
    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;">
      <div style="width:2.5rem;height:1.5px;background:var(--gold-dk);"></div>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--text-dk);">You Might Also <em style="color:var(--forest-leaf);font-style:italic;">Love</em></h2>
    </div>
    <div id="recGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;"></div>
  </div>
</main>

<!-- SHARE MODAL -->
<div id="shareModal" onclick="if(event.target===this)closeShare()">
  <div class="share-sheet">
    <div style="width:40px;height:4px;background:rgba(26,58,42,.15);border-radius:20px;margin:0 auto 1.25rem;"></div>
    <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--text-dk);margin-bottom:.35rem;">Share Your Wishlist</h3>
    <p style="font-size:.78rem;color:var(--text-lt);margin-bottom:1.25rem;">Let friends & family know what you love from the farm.</p>
    <div style="display:flex;gap:.65rem;flex-wrap:wrap;">
      <button onclick="shareVia('whatsapp')" style="flex:1;min-width:80px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:.85rem .5rem;border-radius:14px;border:1.5px solid rgba(26,58,42,.1);background:#f7fef9;cursor:pointer;font-size:.7rem;font-weight:600;color:var(--text-md);transition:all .2s;" onmouseover="this.style.borderColor='#25d366';this.style.background='rgba(37,211,102,.06)'" onmouseout="this.style.borderColor='rgba(26,58,42,.1)';this.style.background='#f7fef9'">
        <span style="font-size:1.5rem;">💬</span> WhatsApp
      </button>
      <button onclick="shareVia('copy')" style="flex:1;min-width:80px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:.85rem .5rem;border-radius:14px;border:1.5px solid rgba(26,58,42,.1);background:#f7fef9;cursor:pointer;font-size:.7rem;font-weight:600;color:var(--text-md);transition:all .2s;" onmouseover="this.style.borderColor='var(--forest-leaf)';this.style.background='rgba(74,140,92,.06)'" onmouseout="this.style.borderColor='rgba(26,58,42,.1)';this.style.background='#f7fef9'">
        <span style="font-size:1.5rem;">🔗</span> Copy Link
      </button>
      <button onclick="shareVia('email')" style="flex:1;min-width:80px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:.85rem .5rem;border-radius:14px;border:1.5px solid rgba(26,58,42,.1);background:#f7fef9;cursor:pointer;font-size:.7rem;font-weight:600;color:var(--text-md);transition:all .2s;" onmouseover="this.style.borderColor='#6366f1';this.style.background='rgba(99,102,241,.06)'" onmouseout="this.style.borderColor='rgba(26,58,42,.1)';this.style.background='#f7fef9'">
        <span style="font-size:1.5rem;">✉️</span> Email
      </button>

<script>
/* ══════════════════════════════════
   DATA — matches index.html
══════════════════════════════════ */
const products = [
  {id:1,  name:"Karunguruvai Rice",      category:"rice",      price:180, oldPrice:220, rating:4.7, reviews:142, badge:"hot",  image:"https://images.unsplash.com/photo-1586201375761-83865001e31c?w=500&auto=format&fit=crop"},
  {id:2,  name:"Karuppu Kavuni Rice",    category:"rice",      price:220, oldPrice:270, rating:4.8, reviews:198, badge:"hot",  image:"https://images.unsplash.com/photo-1568254183919-78a4f43a2877?w=500&auto=format&fit=crop"},
  {id:3,  name:"Arubatham Kuruvai Rice", category:"rice",      price:160, oldPrice:200, rating:4.5, reviews:87,  badge:"new",  image:"https://images.unsplash.com/photo-1514481538271-cf9f99627ab4?w=500&auto=format&fit=crop"},
  {id:4,  name:"Poongar Rice",           category:"rice",      price:200, oldPrice:250, rating:4.6, reviews:113, badge:"sale", image:"https://images.unsplash.com/photo-1603046891744-5d7f1f4b79fa?w=500&auto=format&fit=crop"},
  {id:5,  name:"Mappillai Samba Rice",   category:"rice",      price:210, oldPrice:260, rating:4.7, reviews:156, badge:"hot",  image:"https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=500&auto=format&fit=crop"},
  {id:6,  name:"Iluppai Poo Samba Rice", category:"rice",      price:195, oldPrice:240, rating:4.5, reviews:74,  badge:"new",  image:"https://images.unsplash.com/photo-1585032226651-759b368d7246?w=500&auto=format&fit=crop"},
  {id:7,  name:"Vellai Kavuni Rice",     category:"rice",      price:190, oldPrice:235, rating:4.6, reviews:91,  badge:"new",  image:"https://images.unsplash.com/photo-1568254183919-78a4f43a2877?w=500&auto=format&fit=crop"},
  {id:8,  name:"Paneer Rose",            category:"flowers",   price:150, oldPrice:190, rating:4.8, reviews:204, badge:"hot",  image:"https://images.unsplash.com/photo-1490750967868-88df5691cc5e?w=500&auto=format&fit=crop"},
  {id:9,  name:"Hibiscus Flower",        category:"flowers",   price:120, oldPrice:155, rating:4.6, reviews:167, badge:"sale", image:"https://images.unsplash.com/photo-1596040033229-a9821ebd058d?w=500&auto=format&fit=crop"},
  {id:10, name:"Aavaram Flower",         category:"flowers",   price:110, oldPrice:145, rating:4.5, reviews:88,  badge:"new",  image:"https://images.unsplash.com/photo-1490750967868-88df5691cc5e?w=500&auto=format&fit=crop"},
  {id:11, name:"Butterfly Pea Flower",   category:"flowers",   price:180, oldPrice:220, rating:4.7, reviews:132, badge:"hot",  image:"https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=500&auto=format&fit=crop"},
  {id:12, name:"Organic Rose Milk",      category:"beverages", price:140, oldPrice:175, rating:4.7, reviews:219, badge:"hot",  image:"https://images.unsplash.com/photo-1600891964092-4316c288032e?w=500&auto=format&fit=crop"},
  {id:13, name:"Hibiscus Sherbet",       category:"beverages", price:130, oldPrice:165, rating:4.6, reviews:143, badge:"sale", image:"https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=500&auto=format&fit=crop"},
  {id:14, name:"Idiyappam Flour",        category:"flour",     price:160, oldPrice:200, rating:4.8, reviews:178, badge:"hot",  image:"https://images.unsplash.com/photo-1603046891744-5d7f1f4b79fa?w=500&auto=format&fit=crop"},
  {id:15, name:"Health Mix Powder",      category:"flour",     price:175, oldPrice:215, rating:4.6, reviews:94,  badge:"new",  image:"https://images.unsplash.com/photo-1585032226651-759b368d7246?w=500&auto=format&fit=crop"},
  {id:16, name:"Country Fig Powder",     category:"other",     price:200, oldPrice:250, rating:4.7, reviews:61,  badge:"new",  image:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=500&auto=format&fit=crop"},
];

const QTY_CFG = {
  flowers:   {unit:'pcs', options:[1,5,10,25]},
  rice:      {unit:'kg',  options:[0.25,0.5,1,2]},
  flour:     {unit:'kg',  options:[0.25,0.5,1,2]},
  beverages: {unit:'ml',  options:[250,500,1000,2000]},
  other:     {unit:'kg',  options:[0.25,0.5,1,2]},
};
function getQtyCfg(cat){ return QTY_CFG[cat]||{unit:'pcs',options:[1,2,3,5]}; }
function fmtQty(v,unit){
  if(unit==='ml') return v>=1000?(v/1000)+'L':v+'ml';
  if(unit==='kg') return v+'kg';
  return v+(v===1?' pc':' pcs');
}
function disc(p){ return Math.round((1-p.price/p.oldPrice)*100); }
function stars(r){ return[1,2,3,4,5].map(i=>i<=Math.floor(r)?'★':i-r<1?'✦':'☆').join(''); }

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
let wishlist = JSON.parse(localStorage.getItem('wishlist')||'[]').map(x=>String(x));
let cart     = JSON.parse(localStorage.getItem('cart')||'[]');
let cardQtyState = {};
let activeFilter = 'all';

/* ══════════════════════════════════
   PERSIST + SYNC
══════════════════════════════════ */
function saveWishlist(){ localStorage.setItem('wishlist', JSON.stringify(wishlist)); }
function saveCart(){ localStorage.setItem('cart', JSON.stringify(cart)); syncCounters(); }
function syncCounters(){
  const total = cart.reduce((s,i)=>s+(i.qty||1),0);
  document.querySelectorAll('#cartCount').forEach(el=>el&&(el.textContent=total));
  const mbc = document.getElementById('mobBarCartCount'); if(mbc) mbc.textContent = total;
  const wc = document.getElementById('wishlistCount'); if(wc) wc.textContent = wishlist.length;
}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 2400);
}

/* ══════════════════════════════════
   STATS
══════════════════════════════════ */
function updateStats(){
  const items = wishlist.map(id=>products.find(p=>String(p.id)===String(id))).filter(Boolean);
  const total = items.reduce((s,p)=>s+p.price,0);
  const savings = items.reduce((s,p)=>s+(p.oldPrice-p.price),0);

  document.getElementById('statCount').textContent = items.length;
  document.getElementById('statTotal').textContent = '₹'+total;
  document.getElementById('statSavings').textContent = '₹'+savings;

  const goalWrap = document.getElementById('savingsGoalWrap');
  const fill = document.getElementById('savingsFill');
  const pctEl = document.getElementById('savingsGoalPct');
  const GOAL = 500;
  if(savings > 0){
    goalWrap.style.display = 'block';
    const pct = Math.min(100, Math.round((savings/GOAL)*100));
    setTimeout(()=>fill.style.width=pct+'%', 200);
    pctEl.textContent = pct+'%';
  } else {
    goalWrap.style.display = 'none';
  }
}

/* ══════════════════════════════════
   REMOVE / CLEAR
══════════════════════════════════ */
function removeFromWishlist(id){
  const idx = wishlist.findIndex(x=>String(x)===String(id));
  if(idx>-1) wishlist.splice(idx,1);
  saveWishlist();
  if(typeof WishlistAPI!=='undefined'&&localStorage.getItem('nansai_token'))WishlistAPI.remove(String(id)).catch(()=>{});
  const card = document.getElementById('wcard-'+id);
  if(card){
    card.style.transition='transform .35s ease,opacity .35s ease';
    card.style.transform='scale(.9) translateY(10px)';
    card.style.opacity='0';
    setTimeout(()=>{ card.remove(); updateStats(); checkEmpty(); renderRec(); },350);
  }
  showToast('💔 Removed from wishlist');
}

function clearWishlist(){
  if(!wishlist.length) return;
  if(!confirm('Remove all items from your wishlist?')) return;
  wishlist = [];
  saveWishlist();
  renderWishlist();
  showToast('🌿 Wishlist cleared');
}

/* ══════════════════════════════════
   ADD TO CART (single, with qty)
══════════════════════════════════ */
function startQtyFromWish(id){
  const p = products.find(x=>x.id===id); if(!p) return;
  const cfg = getQtyCfg(p.category);
  cardQtyState[id] = {qty: cfg.options[0], unit: cfg.unit};
  const area = document.getElementById('wish-btn-area-'+id);
  if(!area) return;
  const pills = cfg.options.map((v,i)=>
    `<button class="qty-pill${i===0?' selected':''}" onclick="selectWishPill(${id},${v},this)">${fmtQty(v,cfg.unit)}</button>`
  ).join('');
  area.innerHTML = `<div class="qty-selector-row">
    <div class="qty-grid">${pills}</div>
    <button class="qty-cart-btn" id="wconfirm-${id}" onclick="confirmWishCart(${id},this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 002 1.58h9.78a2 2 0 001.95-1.57l1.65-7.43H5.12"/></svg>
    </button>
  </div>`;
}

function selectWishPill(id,val,btn){
  if(!cardQtyState[id]) return;
  cardQtyState[id].qty = val;
  btn.closest('.qty-selector-row').querySelectorAll('.qty-pill').forEach(p=>p.classList.remove('selected'));
  btn.classList.add('selected');
}

function confirmWishCart(id,btn){
  const p = products.find(x=>x.id===id); if(!p) return;
  const {qty,unit} = cardQtyState[id]||{qty:1,unit:'pcs'};
  const totalPrice = unit==='ml' ? Math.round(p.price*(qty/1000)) : Math.round(p.price*qty);
  const label = fmtQty(qty,unit);
  const ex = cart.find(i=>i.id===id&&i.qtyLabel===label);
  if(ex){ ex.qty+=1; } else { cart.push({id,name:p.name,price:totalPrice,basePrice:p.price,image:p.image,qty:1,qtyVal:qty,qtyLabel:label,unit}); }
  saveCart();
  showToast('🛒 '+p.name+' · '+label+' added!');
  if(btn){
    btn.classList.add('done');
    btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  }
  const area = document.getElementById('wish-btn-area-'+id);
  setTimeout(()=>{
    if(area) area.innerHTML = atcBtnHTML(id);
  }, 1600);
}

function atcBtnHTML(id){
  return `<button class="atc-btn" onclick="startQtyFromWish(${id})">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 002 1.58h9.78a2 2 0 001.95-1.57l1.65-7.43H5.12"/></svg>
    Add to Cart
  </button>`;
}

/* ══════════════════════════════════
   ADD ALL TO CART
══════════════════════════════════ */
function addAllToCart(){
  const items = getFilteredWish();
  if(!items.length){ showToast('🌿 No items to add'); return; }
  items.forEach(p=>{
    const cfg = getQtyCfg(p.category);
    const qty = cfg.options[0]; const unit = cfg.unit;
    const totalPrice = unit==='ml' ? Math.round(p.price*(qty/1000)) : Math.round(p.price*qty);
    const label = fmtQty(qty,unit);
    const ex = cart.find(i=>i.id===p.id&&i.qtyLabel===label);
    if(ex){ ex.qty+=1; } else { cart.push({id:p.id,name:p.name,price:totalPrice,basePrice:p.price,image:p.image,qty:1,qtyVal:qty,qtyLabel:label,unit}); }
  });
  saveCart();
  showToast('🛒 '+items.length+' item'+(items.length>1?'s':'')+' added to cart!');
}

/* ══════════════════════════════════
   FILTER
══════════════════════════════════ */
function setFilter(el, cat){
  document.querySelectorAll('#filterRow .fpill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  activeFilter = cat;
  renderWishlistCards(getFilteredWish());
}
function getFilteredWish(){
  const all = wishlist.map(id=>products.find(p=>String(p.id)===String(id))).filter(Boolean);
  if(activeFilter==='all') return all;
  return all.filter(p=>p.category===activeFilter);
}

function searchWishlist(q){
  const query = q.trim().toLowerCase();
  const d = document.getElementById('wishSearchInput');
  const m = document.getElementById('wishSearchMob');
  if(d && d.value !== q) d.value = q;
  if(m && m.value !== q) m.value = q;
  if(!query){ renderWishlistCards(getFilteredWish()); return; }
  const all = wishlist.map(id=>products.find(p=>String(p.id)===String(id))).filter(Boolean);
  const results = all.filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query));
  renderWishlistCards(results);
}

/* ══════════════════════════════════
   CARD RENDER
══════════════════════════════════ */
function wishCardHTML(p, delay){
  const d = disc(p);
  const badgeEl = p.badge==='hot'
    ? `<span class="card-badge" style="background:#f97316;">🔥 HOT</span>`
    : p.badge==='new'
    ? `<span class="card-badge" style="background:#166534;">✨ NEW</span>`
    : `<span class="card-badge" style="background:#ef4444;">${d}% OFF</span>`;
  return `<div class="wish-card sr card-enter" id="wcard-${p.id}" style="animation-delay:${delay}ms;overflow:visible;">
    <div class="wish-card-img">
      ${badgeEl}
      <button class="remove-btn" onclick="removeFromWishlist(${p.id})" title="Remove">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <img src="${p.image}" alt="${p.name}" loading="lazy"/>
      <!-- heart overlay on hover -->
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;background:rgba(15,34,24,.18);" class="card-hover-overlay" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0">
        <span style="font-size:2rem;filter:drop-shadow(0 2px 8px rgba(0,0,0,.35));">❤️</span>
      </div>
    </div>
    <div style="padding:.85rem;display:flex;flex-direction:column;gap:4px;flex:1;">
      <span style="font-size:.62rem;font-weight:600;color:#16a34a;text-transform:uppercase;letter-spacing:.1em;">${p.category}</span>
      <h3 style="font-size:.95rem;font-weight:700;color:var(--text-dk);line-height:1.3;font-family:'Inter',sans-serif;">${p.name}</h3>
      <div style="display:flex;align-items:center;gap:3px;">
        <span style="color:#f59e0b;font-size:.75rem;">${stars(p.rating)}</span>
        <span style="color:#9ca3af;font-size:.68rem;margin-left:2px;">${p.rating} (${p.reviews})</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;margin-top:2px;">
        <span style="color:#166534;font-weight:900;font-size:1.05rem;font-family:'Inter',sans-serif;">₹${p.price}</span>
        <span style="color:#9ca3af;font-size:.76rem;text-decoration:line-through;">₹${p.oldPrice}</span>
        <span style="background:#fef3c7;color:#92400e;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:20px;">${d}% off</span>
      </div>
      <!-- savings pill -->
      <div style="display:inline-flex;align-items:center;gap:4px;background:rgba(21,128,61,.08);border-radius:6px;padding:3px 8px;width:fit-content;margin-top:2px;">
        <span style="font-size:.62rem;font-weight:700;color:#15803d;">Save ₹${p.oldPrice-p.price}</span>
      </div>
      <div id="wish-btn-area-${p.id}" style="margin-top:auto;padding-top:6px;">
        ${atcBtnHTML(p.id)}
      </div>
      <a href="product.html?id=${p.id}" style="display:block;text-align:center;font-size:.68rem;font-weight:600;color:var(--forest-leaf);text-decoration:none;padding:4px 0;margin-top:2px;transition:color .2s;" onmouseover="this.style.color='var(--forest-deep)'" onmouseout="this.style.color='var(--forest-leaf)'">View Details →</a>
    </div>
  </div>`;
}

function renderWishlistCards(items){
  const grid = document.getElementById('wishGrid');
  const empty = document.getElementById('emptyState');
  const recSec = document.getElementById('recSection');
  if(!items.length && activeFilter==='all'){
    grid.style.display='none'; empty.style.display='flex';
    recSec.style.display='none'; return;
  }
  empty.style.display='none'; grid.style.display='grid';
  if(!items.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem 0;">
      <p style="color:var(--text-lt);font-size:.88rem;">No items in this category.</p>
    </div>`;
    return;
  }
  grid.innerHTML = items.map((p,i)=>wishCardHTML(p,i*60)).join('');
  grid.querySelectorAll('.sr').forEach(el=>srObserver.observe(el));
}

function renderWishlist(){
  renderWishlistCards(getFilteredWish());
  updateStats();
  checkEmpty();
  renderRec();
}

function checkEmpty(){
  const recSec = document.getElementById('recSection');
  if(wishlist.length>0) recSec.style.display='block';
  else recSec.style.display='none';
}

/* ══════════════════════════════════
   RECOMMENDATIONS
══════════════════════════════════ */
function renderRec(){
  const recSec = document.getElementById('recSection');
  const recGrid = document.getElementById('recGrid');
  if(!wishlist.length){ recSec.style.display='none'; return; }
  recSec.style.display='block';
  const notInWish = products.filter(p=>!wishlist.find(x=>String(x)===String(p.id)));
  const recs = notInWish.sort(()=>Math.random()-.5).slice(0,4);
  recGrid.innerHTML = recs.map((p,i)=>{
    const d = disc(p);
    return `<div class="wish-card" style="animation:cardIn .4s cubic-bezier(.22,1,.36,1) ${i*80}ms both;">
      <div class="wish-card-img" style="height:170px;">
        <img src="${p.image}" alt="${p.name}" loading="lazy"/>
        <button onclick="addToWishlistFromRec(${p.id},this)" id="recwish-${p.id}" style="position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:.8rem;transition:transform .2s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">♡</button>
      </div>
      <div style="padding:.75rem;display:flex;flex-direction:column;gap:3px;">
        <span style="font-size:.6rem;font-weight:600;color:#16a34a;text-transform:uppercase;letter-spacing:.1em;">${p.category}</span>
        <h4 style="font-size:.88rem;font-weight:700;color:var(--text-dk);line-height:1.3;">${p.name}</h4>
        <div style="display:flex;align-items:baseline;gap:5px;margin-top:2px;">
          <span style="color:#166534;font-weight:900;font-size:.95rem;">₹${p.price}</span>
          <span style="color:#9ca3af;font-size:.72rem;text-decoration:line-through;">₹${p.oldPrice}</span>
          <span style="background:#fef3c7;color:#92400e;font-size:.58rem;font-weight:700;padding:2px 5px;border-radius:20px;">${d}% off</span>
        </div>
        <button onclick="addToWishlistFromRec(${p.id},this)" id="recwish-btn-${p.id}" style="margin-top:7px;width:100%;background:rgba(26,58,42,.06);color:var(--forest-deep);font-size:.72rem;font-weight:700;padding:8px;border-radius:8px;border:1.5px solid rgba(26,58,42,.12);cursor:pointer;font-family:'Roboto',sans-serif;transition:all .2s;" onmouseover="this.style.background='var(--forest-deep)';this.style.color='#fff'" onmouseout="this.style.background='rgba(26,58,42,.06)';this.style.color='var(--forest-deep)'">
          ♡ Save to Wishlist
        </button>
      </div>
    </div>`;
  }).join('');
}

function addToWishlistFromRec(id, btn){
  if(!wishlist.find(x=>String(x)===String(id))){
    wishlist.push(String(id));
    saveWishlist();
    if(typeof WishlistAPI!=='undefined'&&localStorage.getItem('nansai_token'))WishlistAPI.add(String(id)).catch(()=>{});
    showToast('💖 Added to wishlist!');
    btn.textContent='♥ Saved!';
    btn.style.color='#ef4444';
    setTimeout(()=>renderWishlist(),600);
  }
}

/* ══════════════════════════════════
   CART DRAWER
══════════════════════════════════ */
function openCart(){ renderCartDrawer(); document.getElementById('cartDrawer').style.transform='translateX(0)'; document.getElementById('cartBackdrop').style.display='block'; document.body.style.overflow='hidden'; }
function closeCart(){ document.getElementById('cartDrawer').style.transform='translateX(100%)'; document.getElementById('cartBackdrop').style.display='none'; document.body.style.overflow=''; }
function renderCartDrawer(){
  const body = document.getElementById('cartBody');
  const footer = document.getElementById('cartFooter');
  if(!body) return;
  if(!cart.length){
    body.innerHTML='<div style="text-align:center;padding:3rem 1rem;"><div style="font-size:3rem;margin-bottom:.75rem;">🛒</div><p style="color:#9ca3af;font-weight:600;">Your cart is empty</p><button onclick="closeCart();window.location.href=\'index.html#products\'" style="margin-top:1rem;background:var(--forest-deep);color:#fff;padding:.6rem 1.4rem;border-radius:8px;font-size:.8rem;font-weight:700;border:none;cursor:pointer;">Shop Now</button></div>';
    if(footer) footer.style.display='none'; return;
  }
  const total = cart.reduce((s,i)=>s+i.price*(i.qty||1),0);
  body.innerHTML = cart.map((item,idx)=>{
    const prod = products.find(p=>p.id===item.id);
    return `<div style="display:flex;gap:.85rem;align-items:center;padding:.85rem 0;border-bottom:1px solid rgba(26,58,42,.07);">
      <div style="width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#f0fdf4;"><img src="${prod?.image||''}" style="width:100%;height:100%;object-fit:cover;"/></div>
      <div style="flex:1;min-width:0;">
        <p style="font-size:.78rem;font-weight:700;color:#1a2416;line-height:1.3;">${item.name}</p>
        <p style="font-size:.68rem;color:#6b7280;">${item.qtyLabel||''}</p>
        <p style="font-size:.72rem;color:#166534;font-weight:700;margin-top:2px;">₹${item.price} × ${item.qty||1} = <strong>₹${item.price*(item.qty||1)}</strong></p>
      </div>
      <div style="display:flex;align-items:center;gap:4px;">
        <button onclick="cartQty(${idx},-1)" style="width:24px;height:24px;border:1px solid #d1d5db;border-radius:5px;background:#f3f4f6;cursor:pointer;font-weight:700;font-size:.75rem;">−</button>
        <span style="font-size:.78rem;font-weight:700;min-width:18px;text-align:center;">${item.qty||1}</span>
        <button onclick="cartQty(${idx},1)" style="width:24px;height:24px;border:1px solid #d1d5db;border-radius:5px;background:#f3f4f6;cursor:pointer;font-weight:700;font-size:.75rem;">+</button>
        <button onclick="removeCart(${idx})" style="width:24px;height:24px;border:none;background:none;cursor:pointer;color:#ef4444;font-size:.85rem;margin-left:2px;">✕</button>
      </div>
    </div>`;
  }).join('');
  if(footer){
    footer.style.display='block';
    footer.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem;"><span style="font-size:.82rem;font-weight:600;color:#6b7280;">Subtotal</span><span style="font-size:1rem;font-weight:800;color:#166534;">₹${total}</span></div><a href="checkoutmyorderpage.html" style="display:block;text-align:center;background:var(--forest-deep);color:#fff;padding:.75rem;border-radius:10px;font-weight:700;font-size:.85rem;text-decoration:none;">Proceed to Checkout →</a>`;
  }
}
function cartQty(idx,delta){ const i=cart[idx]; if(!i)return; i.qty=Math.max(1,(i.qty||1)+delta); if(i.basePrice&&i.qtyVal&&i.unit){const m=i.unit==='ml'?i.qtyVal/1000:i.qtyVal;i.price=Math.round(i.basePrice*m);} saveCart(); renderCartDrawer(); }
function removeCart(idx){ cart.splice(idx,1); saveCart(); renderCartDrawer(); }

/* ══════════════════════════════════
   SHARE
══════════════════════════════════ */
function openShare(){ document.getElementById('shareModal').classList.add('open'); }
function closeShare(){ document.getElementById('shareModal').classList.remove('open'); }
function shareVia(method){
  const url = window.location.href;
  const text = '🌿 Check out my Nansai Organics wishlist! ' + wishlist.length + ' farm-fresh products: ' + url;
  if(method==='whatsapp') window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
  else if(method==='copy'){ navigator.clipboard.writeText(url).catch(()=>{}); showToast('🔗 Link copied!'); closeShare(); }
  else if(method==='email') window.open('mailto:?subject=My Nansai Wishlist&body='+encodeURIComponent(text),'_blank');
  else if(method==='native' && navigator.share){ navigator.share({title:'My Nansai Wishlist',text:text,url:url}).catch(()=>{}); }
  else { navigator.clipboard.writeText(url).catch(()=>{}); showToast('🔗 Link copied!'); closeShare(); }
}

/* ══════════════════════════════════
   SCROLL REVEAL
══════════════════════════════════ */
const srObserver = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('vis'); });
},{threshold:0.08,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('.sr').forEach(el=>srObserver.observe(el));

syncCounters();

(function(){
  const token=localStorage.getItem('nansai_token');
  if(!token||typeof WishlistAPI==='undefined')return;
  WishlistAPI.get().then(res=>{
    const ids=(res.data||[]).map(p=>typeof p==='object'?(p.id||p._id):p);
    if(ids.length){wishlist=ids;saveWishlist();renderWishlist();}
  }).catch(()=>{});
})();
</script>
