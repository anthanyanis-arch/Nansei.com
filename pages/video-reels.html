<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Reels Component</title>
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f4f0; min-height: 100vh; }

    /* ─── Mini Player ─── */
    #reel-widget {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 280px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
      background: #000;
      z-index: 1000;
      transition: transform .4s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
    }
    /* Tablet */
    @media (max-width: 768px) { #reel-widget { width: 220px; } }
    /* Mobile */
    @media (max-width: 480px) {
      #reel-widget { width: 170px; right: 50%; transform: translateX(50%); bottom: 16px; }
      #reel-widget.minimized { transform: translateX(calc(50% + 110%)) !important; }
    }
    #reel-widget.minimized { transform: translateX(110%); }

    /* ─── Video Stack ─── */
    .reel-track {
      position: relative;
      width: 100%;
      aspect-ratio: 9/16;
      overflow: hidden;
    }
    .reel-slide {
      position: absolute; inset: 0;
      transform: translateY(100%);
      transition: transform .45s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }
    .reel-slide.active  { transform: translateY(0); }
    .reel-slide.prev    { transform: translateY(-100%); }
    .reel-slide video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── Dots ─── */
    .reel-dots {
      position: absolute; right: 8px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 6px;
      z-index: 5;
    }
    .reel-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.45);
      cursor: pointer;
      transition: background .25s, transform .25s;
    }
    .reel-dots span.active { background: #fff; transform: scale(1.4); }

    /* ─── Mini caption bar ─── */
    .mini-caption {
      padding: 8px 10px;
      background: linear-gradient(0deg,rgba(0,0,0,.7),transparent);
      position: absolute; bottom: 0; left: 0; right: 0;
      color: #fff; font-size: 11px;
      pointer-events: none;
    }

    /* ─── Minimize tab ─── */
    #reel-tab {
      position: fixed;
      bottom: 24px; right: 0;
      background: #2d6a4f;
      color: #fff;
      border-radius: 8px 0 0 8px;
      padding: 10px 8px;
      cursor: pointer;
      z-index: 999;
      font-size: 18px;
      display: none;
      box-shadow: -2px 2px 8px rgba(0,0,0,.3);
      transition: background .2s;
    }
    #reel-tab:hover { background: #1b4332; }
    @media (max-width: 480px) { #reel-tab { bottom: 16px; } }

    /* ─── Minimize button inside widget ─── */
    #btn-minimize {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.5);
      border: none; color: #fff;
      border-radius: 50%;
      width: 28px; height: 28px;
      font-size: 14px;
      cursor: pointer;
      z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    #btn-minimize:hover { background: rgba(0,0,0,.8); }

    /* ─── Modal ─── */
    #reel-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
      pointer-events: none;
      transition: background .3s;
    }
    #reel-modal.open {
      background: rgba(0,0,0,.75);
      pointer-events: all;
    }
    .modal-box {
      width: min(400px, 95vw);
      background: #111;
      border-radius: 20px;
      overflow: hidden;
      transform: scale(.9);
      opacity: 0;
      transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .3s;
      display: flex; flex-direction: column;
      max-height: 92vh;
    }
    #reel-modal.open .modal-box { transform: scale(1); opacity: 1; }

    /* Modal header */
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a1a;
    }
    .modal-caption { color: #e0e0e0; font-size: 13px; flex: 1; }
    #btn-close {
      background: none; border: none; color: #fff;
      font-size: 20px; cursor: pointer; line-height: 1;
    }

    /* Modal reel track */
    .modal-track {
      position: relative;
      flex: 1;
      overflow: hidden;
      aspect-ratio: 9/16;
    }

    /* Product card */
    .product-card {
      padding: 12px 16px;
      background: #1a1a1a;
      display: flex; align-items: center; justify-content: space-between;
    }
    .product-card .name { color: #fff; font-size: 14px; font-weight: 600; }
    .product-card .price { color: #52b788; font-size: 14px; font-weight: 700; }
    .product-card .btn-buy {
      background: #2d6a4f; color: #fff;
      border: none; border-radius: 8px;
      padding: 6px 14px; font-size: 13px;
      cursor: pointer;
    }
    .product-card .btn-buy:hover { background: #1b4332; }

    /* Arrow buttons (desktop) */
    .reel-arrows {
      position: absolute; left: 0; right: 0;
      top: 50%; transform: translateY(-50%);
      display: flex; justify-content: space-between;
      padding: 0 6px;
      pointer-events: none;
      z-index: 6;
    }
    .reel-arrows button {
      pointer-events: all;
      background: rgba(0,0,0,.45);
      border: none; color: #fff;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    @media (max-width: 480px) { .reel-arrows { display: none; } }
  </style>
</head>
<body>

<!-- ─── Restore Tab ─── -->
<div id="reel-tab" title="Restore">&#8592;</div>

<!-- ─── Mini Player ─── -->
<div id="reel-widget">
  <button id="btn-minimize" title="Minimize">&#10145;</button>
  <div class="reel-track" id="mini-track">
    <!-- slides injected by JS -->
    <div class="reel-dots" id="mini-dots"></div>
  </div>
</div>

<!-- ─── Expanded Modal ─── -->
<div id="reel-modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-caption" id="modal-caption"></span>
      <button id="btn-close">&#10005;</button>
    </div>
    <div class="modal-track" id="modal-track">
      <div class="reel-arrows">
        <button id="modal-prev">&#8593;</button>
        <button id="modal-next">&#8595;</button>
      </div>
      <div class="reel-dots" id="modal-dots"></div>
    </div>
    <div class="product-card">
      <div>
        <div class="name" id="modal-product-name"></div>
        <div class="price" id="modal-product-price"></div>
      </div>
      <button class="btn-buy">Shop Now</button>
    </div>
  </div>
</div>

<script>
/* ─── Video Data ─── */
const VIDEOS = [
  {
    src: 'https://www.w3schools.com/html/mov_bbb.mp4',
    caption: '🌿 Fresh organic greens, straight from the farm',
    product: 'Organic Spinach Bundle', price: '₹149'
  },
  {
    src: 'https://www.w3schools.com/html/movie.mp4',
    caption: '🥕 Crunchy carrots — nature\'s best snack',
    product: 'Farm Carrots 1kg', price: '₹89'
  },
  {
    src: 'https://www.learningcontainer.com/wp-content/uploads/2020/05/sample-mp4-file.mp4',
    caption: '🍅 Sun-ripened tomatoes, zero chemicals',
    product: 'Heirloom Tomatoes 500g', price: '₹119'
  },
  {
    src: 'https://samplelib.com/lib/preview/mp4/sample-5s.mp4',
    caption: '🌾 Cold-pressed mustard oil — pure & natural',
    product: 'Mustard Oil 1L', price: '₹220'
  }
];

/* ─── State ─── */
let current = 0;
let autoTimer = null;
const INTERVAL = 6000; // 6 seconds

/* ─── Helpers ─── */
const $ = id => document.getElementById(id);

function buildSlides(trackEl, dotsEl, onDotClick) {
  VIDEOS.forEach((v, i) => {
    const slide = document.createElement('div');
    slide.className = 'reel-slide' + (i === 0 ? ' active' : '');
    slide.dataset.index = i;

    const vid = document.createElement('video');
    vid.src = v.src;
    vid.muted = true; vid.loop = true; vid.playsInline = true;
    vid.preload = 'none'; // lazy
    if (i === 0) { vid.preload = 'auto'; vid.play(); }

    slide.appendChild(vid);

    // mini caption overlay
    if (trackEl === $('mini-track')) {
      const cap = document.createElement('div');
      cap.className = 'mini-caption';
      cap.textContent = v.caption;
      slide.appendChild(cap);
    }

    trackEl.insertBefore(slide, dotsEl);

    // dot
    const dot = document.createElement('span');
    dot.className = i === 0 ? 'active' : '';
    dot.addEventListener('click', e => { e.stopPropagation(); onDotClick(i); });
    dotsEl.appendChild(dot);
  });
}

function getSlides(trackEl) {
  return trackEl.querySelectorAll('.reel-slide');
}

function goTo(index, trackEl, dotsEl) {
  const slides = getSlides(trackEl);
  const dots   = dotsEl.querySelectorAll('span');
  const prev   = current;

  slides[prev].classList.remove('active');
  slides[prev].classList.add('prev');
  slides[prev].querySelector('video').pause();

  // reset prev class after transition
  setTimeout(() => slides[prev].classList.remove('prev'), 460);

  current = (index + VIDEOS.length) % VIDEOS.length;

  const nextSlide = slides[current];
  nextSlide.classList.add('active');
  const vid = nextSlide.querySelector('video');
  vid.preload = 'auto';
  vid.play();

  dots.forEach((d, i) => d.classList.toggle('active', i === current));
}

/* Sync both tracks to same index */
function syncTo(index) {
  const miniTrack  = $('mini-track');
  const modalTrack = $('modal-track');
  const miniDots   = $('mini-dots');
  const modalDots  = $('modal-dots');

  goTo(index, miniTrack, miniDots);
  goTo(index, modalTrack, modalDots);

  // update modal UI
  $('modal-caption').textContent = VIDEOS[current].caption;
  $('modal-product-name').textContent = VIDEOS[current].product;
  $('modal-product-price').textContent = VIDEOS[current].price;
}

function startAuto() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => syncTo(current + 1), INTERVAL);
}

/* ─── Init ─── */
buildSlides($('mini-track'),  $('mini-dots'),  i => { syncTo(i); startAuto(); });
buildSlides($('modal-track'), $('modal-dots'), i => { syncTo(i); startAuto(); });

// set initial modal UI
$('modal-caption').textContent = VIDEOS[0].caption;
$('modal-product-name').textContent = VIDEOS[0].product;
$('modal-product-price').textContent = VIDEOS[0].price;

startAuto();

/* ─── Mini player click → open modal ─── */
$('reel-widget').addEventListener('click', e => {
  if (e.target.closest('#btn-minimize')) return;
  $('reel-modal').classList.add('open');
});

/* ─── Close modal ─── */
$('btn-close').addEventListener('click', () => $('reel-modal').classList.remove('open'));
$('reel-modal').addEventListener('click', e => {
  if (e.target === $('reel-modal')) $('reel-modal').classList.remove('open');
});

/* ─── Arrow buttons (modal desktop) ─── */
$('modal-prev').addEventListener('click', e => { e.stopPropagation(); syncTo(current - 1); startAuto(); });
$('modal-next').addEventListener('click', e => { e.stopPropagation(); syncTo(current + 1); startAuto(); });

/* ─── Minimize / Restore ─── */
$('btn-minimize').addEventListener('click', e => {
  e.stopPropagation();
  $('reel-widget').classList.add('minimized');
  $('reel-tab').style.display = 'flex';
});
$('reel-tab').addEventListener('click', () => {
  $('reel-widget').classList.remove('minimized');
  $('reel-tab').style.display = 'none';
});

/* ─── Swipe (touch) ─── */
function addSwipe(el) {
  let startY = 0;
  el.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  el.addEventListener('touchend', e => {
    const dy = startY - e.changedTouches[0].clientY;
    if (Math.abs(dy) < 40) return;
    syncTo(dy > 0 ? current + 1 : current - 1);
    startAuto();
  }, { passive: true });
}
addSwipe($('mini-track'));
addSwipe($('modal-track'));
</script>
</body>
</html>
